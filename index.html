<!DOCTYPE html>
<html>
  <head>
    <title>Проект "Комменты"</title>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <div class="container">
      <ul class="comments">
        <li class="comment">
          <div class="comment-header">
            <div>Глеб Фокин</div>
            <div>12.02.22 12:18</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Это будет первый комментарий на этой странице
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">3</span>
              <button class="like-button"></button>
            </div>
          </div>
        </li>
        <li class="comment">
          <div class="comment-header">
            <div>Варвара Н.</div>
            <div>13.02.22 19:22</div>
          </div>
          <div class="comment-body">
            <div class="comment-text">
              Мне нравится как оформлена эта страница! ❤
            </div>
          </div>
          <div class="comment-footer">
            <div class="likes">
              <span class="likes-counter">75</span>
              <button class="like-button -active-like"></button>
            </div>
          </div>
        </li>
      </ul>
      <div class="add-form">
        <input
          type="text"
          class="add-form-name"
          placeholder="Введите ваше имя"
          id="name"
        />
        <textarea
          type="textarea"
          class="add-form-text"
          placeholder="Введите ваш коментарий"
          rows="4"
          id="comments"
        ></textarea>
        <div class="add-form-row">
          <button class="add-form-button">Написать</button>
        </div>
      </div>
    </div>
  </body>

  <script>
      "use strict";
      
      let comments = [
          {
              name: "Глеб Фокин",
              date: "12.02.22 12:18",
              text: "Это будет первый комментарий на этой странице",
              likes: 3,
              isLiked: false
          },
          {
              name: "Варвара Н.",
              date: "13.02.22 19:22",
              text: "Мне нравится как оформлена эта страница! ❤",
              likes: 75,
              isLiked: true
          }
      ];
      
      const nameInput = document.getElementById("name");
      const commentInput = document.getElementById("comments");
      const addButton = document.querySelector(".add-form-button");
      const commentsList = document.querySelector(".comments");
      
      function escapeHtml(text) {
          return text
              .replaceAll("&", "&amp;")
              .replaceAll("<", "&lt;")
              .replaceAll(">", "&gt;")
              .replaceAll('"', "&quot;")
              .replaceAll("'", "&#39;");
      }
      
      function getCurrentDateTime() {
          const now = new Date();
          const day = String(now.getDate()).padStart(2, '0');
          const month = String(now.getMonth() + 1).padStart(2, '0');
          const year = String(now.getFullYear()).slice(-2);
          const hours = String(now.getHours()).padStart(2, '0');
          const minutes = String(now.getMinutes()).padStart(2, '0');
          return `${day}.${month}.${year} ${hours}:${minutes}`;
      }
      
      function renderComments() {
          let commentsHTML = "";
          
          for (let i = 0; i < comments.length; i++) {
              const comment = comments[i];
              const likeButtonClass = comment.isLiked ? "-active-like" : "";
              const escapedName = escapeHtml(comment.name);
              const escapedText = escapeHtml(comment.text);
              
              commentsHTML += `
                  <li class="comment" data-index="${i}">
                      <div class="comment-header">
                          <div>${escapedName}</div>
                          <div>${comment.date}</div>
                      </div>
                      <div class="comment-body">
                          <div class="comment-text">
                              ${escapedText}
                          </div>
                      </div>
                      <div class="comment-footer">
                          <div class="likes">
                              <span class="likes-counter">${comment.likes}</span>
                              <button class="like-button ${likeButtonClass}"></button>
                          </div>
                      </div>
                  </li>
              `;
          }
          
          commentsList.innerHTML = commentsHTML;
      }
      
      function handleLikeClick(event) {
          event.stopPropagation();
          const button = event.target;
          const li = button.closest(".comment");
          const index = parseInt(li.getAttribute("data-index"));
          
          if (comments[index].isLiked) {
              comments[index].likes--;
              comments[index].isLiked = false;
          } else {
              comments[index].likes++;
              comments[index].isLiked = true;
          }
          
          renderComments();
      }
      
      function handleCommentClick(event) {
          const li = event.target.closest(".comment");
          if (!li) return;
          
          const index = parseInt(li.getAttribute("data-index"));
          const comment = comments[index];
          
          const quotedText = `> ${comment.name}: ${comment.text}\n\n`;
          const currentText = commentInput.value;
          
          commentInput.value = quotedText + currentText;
          commentInput.focus();
      }
      
      nameInput.addEventListener("input", () => {
          console.log("Имя изменено");
      });
      
      commentInput.addEventListener("input", () => {
          console.log("Комментарий изменен");
      });
      
      addButton.addEventListener("click", () => {
          let name = nameInput.value;
          let commentText = commentInput.value;
          
          if (name.trim() === "" || commentText.trim() === "") {
              return;
          }
          
          name = escapeHtml(name);
          commentText = escapeHtml(commentText);
          
          const newComment = {
              name: name,
              date: getCurrentDateTime(),
              text: commentText,
              likes: 0,
              isLiked: false
          };
          
          comments.push(newComment);
          
          nameInput.value = "";
          commentInput.value = "";
          
          renderComments();
      });
      
      commentsList.addEventListener("click", (event) => {
          if (event.target.classList.contains("like-button")) {
              handleLikeClick(event);
          } else {
              handleCommentClick(event);
          }
      });
      
      renderComments();
      
      console.log("It works!");
  </script>
</html>
